<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Поиск фильмов</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #111;
      color: #fff;
      margin: 0;
      padding: 20px;
      text-align: center;
    }
    h1 { margin: 20px 0; }
    input { padding: 12px; width: 300px; font-size: 16px; border-radius: 8px; border: none; }
    button { 
      padding: 12px 24px; 
      background: #e50914; 
      color: white; 
      border: none; 
      border-radius: 8px; 
      cursor: pointer; 
    }
    .movies {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
      margin-top: 30px;
    }
    .card {
      background: #222;
      width: 180px;
      border-radius: 12px;
      overflow: hidden;
      cursor: pointer;
      transition: 0.3s;
    }
    .card:hover { transform: scale(1.08); box-shadow: 0 0 20px rgba(229,9,20,0.6); }
    .card img { width: 100%; height: 260px; object-fit: cover; }
    .info { padding: 12px; }

    .modal {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.95);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }
    .modal-content {
      background: #222;
      padding: 25px;
      border-radius: 12px;
      max-width: 700px;
      width: 90%;
    }
    .close { float: right; font-size: 32px; cursor: pointer; }
    .trailer-btn {
      background: #ff0000;
      color: white;
      padding: 12px 20px;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
      margin: 15px 0;
    }
  </style>
</head>
<body>

  <h1>🎬 Поиск фильмов</h1>
  
  <input id="searchInput" placeholder="Название фильма..." type="text">
  <button onclick="searchMovies()">Искать</button>

  <div class="movies" id="movies"></div>

  <!-- Модальное окно -->
  <div id="modal" class="modal">
    <div class="modal-content">
      <span class="close" onclick="closeModal()">×</span>
      <h2 id="modalTitle"></h2>
      <div id="modalMeta" style="margin: 10px 0; color: #ccc;"></div>
      <button class="trailer-btn" onclick="watchTrailer()">▶ Смотреть трейлер на YouTube</button>
      <p id="modalPlot" style="text-align: left; line-height: 1.5;"></p>
    </div>
  </div>

<script>
const API_KEY = "be3d5ef4";

async function searchMovies() {
  const query = document.getElementById("searchInput").value.trim();
  if (!query) return;

  const container = document.getElementById("movies");
  container.innerHTML = "<p>Загрузка...</p>";

  try {
    const res = await fetch(`https://www.omdbapi.com/?apikey=${API_KEY}&s=${encodeURIComponent(query)}`);
    const data = await res.json();

    container.innerHTML = data.Response === "True" && data.Search ? "" : "<p>Ничего не найдено 😔</p>";

    data.Search?.forEach(movie => {
      const div = document.createElement("div");
      div.className = "card";
      div.onclick = () => showMovieDetails(movie.imdbID);

      const poster = movie.Poster !== "N/A" ? movie.Poster : "https://via.placeholder.com/300x400/222/aaa?text=No+Poster";

      div.innerHTML = `
        <img src="${poster}">
        <div class="info">
          <strong>${movie.Title}</strong><br>
          <small>${movie.Year} • ${movie.Type}</small>
        </div>
      `;
      container.appendChild(div);
    });
  } catch (e) {
    container.innerHTML = "<p>Ошибка загрузки. Проверь интернет.</p>";
  }
}

async function showMovieDetails(imdbID) {
  const modal = document.getElementById("modal");

  try {
    const res = await fetch(`https://www.omdbapi.com/?apikey=${API_KEY}&i=${imdbID}&plot=full`);
    const movie = await res.json();

    document.getElementById("modalTitle").textContent = movie.Title;
    document.getElementById("modalMeta").innerHTML = `
      ${movie.Year} • ${movie.Runtime} • ⭐ ${movie.imdbRating}/10<br>
      <strong>${movie.Genre}</strong>
    `;
    document.getElementById("modalPlot").textContent = movie.Plot || "Описание отсутствует.";

    // Сохраняем название для трейлера
    window.currentMovieTitle = movie.Title + " " + movie.Year;

    modal.style.display = "flex";
  } catch (e) {
    alert("Не удалось загрузить детали фильма");
  }
}

function watchTrailer() {
  if (window.currentMovieTitle) {
    const url = `https://www.youtube.com/results?search_query=${encodeURIComponent(window.currentMovieTitle + " official trailer")}`;
    window.open(url, '_blank');
  }
}

function closeModal() {
  document.getElementById("modal").style.display = "none";
}

// Поиск по Enter
document.getElementById("searchInput").addEventListener("keypress", e => {
  if (e.key === "Enter") searchMovies();
});
</script>

</body>
</html>
