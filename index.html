<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Поиск фильмов</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #111;
      color: #fff;
      margin: 0;
      padding: 20px;
      text-align: center;
    }
    h1 { margin: 20px 0; }
    input {
      padding: 12px;
      width: 300px;
      font-size: 16px;
      border: none;
      border-radius: 8px;
    }
    button {
      padding: 12px 24px;
      background: #e50914;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }
    .movies {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
      margin-top: 30px;
    }
    .card {
      background: #222;
      width: 180px;
      border-radius: 12px;
      overflow: hidden;
      cursor: pointer;
      transition: all 0.3s;
    }
    .card:hover {
      transform: scale(1.08);
      box-shadow: 0 0 20px rgba(229, 9, 20, 0.5);
    }
    .card img {
      width: 100%;
      height: 260px;
      object-fit: cover;
    }
    .info {
      padding: 12px;
    }
    .modal {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.95);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }
    .modal-content {
      background: #222;
      padding: 20px;
      border-radius: 12px;
      max-width: 900px;
      width: 90%;
    }
    .close {
      float: right;
      font-size: 30px;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <h1>🎬 Поиск фильмов</h1>
  
  <input id="searchInput" placeholder="Название фильма..." type="text">
  <button onclick="searchMovies()">Искать</button>

  <div class="movies" id="movies"></div>

  <!-- Модальное окно -->
  <div id="modal" class="modal">
    <div class="modal-content">
      <span class="close" onclick="closeModal()">×</span>
      <h2 id="modalTitle"></h2>
      <div id="modalYear"></div>
      <iframe id="trailer" width="100%" height="500" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
      <p id="modalPlot"></p>
    </div>
  </div>

<script>
const API_KEY = "be3d5ef4";

async function searchMovies() {
  const query = document.getElementById("searchInput").value.trim();
  if (!query) return;

  const container = document.getElementById("movies");
  container.innerHTML = "<p>Загрузка...</p>";

  try {
    const res = await fetch(`https://www.omdbapi.com/?apikey=${API_KEY}&s=${encodeURIComponent(query)}`);
    const data = await res.json();

    container.innerHTML = "";

    if (data.Response === "True") {
      data.Search.forEach(movie => {
        const div = document.createElement("div");
        div.className = "card";
        div.onclick = () => showMovieDetails(movie.imdbID);

        div.innerHTML = `
          <img src="${movie.Poster !== 'N/A' ? movie.Poster : 'https://via.placeholder.com/300x400?text=No+Poster'}" alt="${movie.Title}">
          <div class="info">
            <strong>${movie.Title}</strong><br>
            <small>${movie.Year} • ${movie.Type}</small>
          </div>
        `;
        container.appendChild(div);
      });
    } else {
      container.innerHTML = "<p>Ничего не найдено 😔</p>";
    }
  } catch (e) {
    container.innerHTML = "<p>Ошибка загрузки</p>";
  }
}

async function showMovieDetails(imdbID) {
  const modal = document.getElementById("modal");
  const titleEl = document.getElementById("modalTitle");
  const yearEl = document.getElementById("modalYear");
  const plotEl = document.getElementById("modalPlot");
  const trailerEl = document.getElementById("trailer");

  try {
    const res = await fetch(`https://www.omdbapi.com/?apikey=${API_KEY}&i=${imdbID}&plot=full`);
    const movie = await res.json();

    titleEl.textContent = movie.Title;
    yearEl.textContent = `${movie.Year} • ${movie.Runtime} • ⭐ ${movie.imdbRating}`;
    plotEl.textContent = movie.Plot;

    // Ищем трейлер на YouTube
    const youtubeRes = await fetch(`https://www.youtube.com/results?search_query=${encodeURIComponent(movie.Title + " official trailer")}`);
    // Простой способ — открываем поиск трейлера
    trailerEl.src = `https://www.youtube.com/embed/?listType=search&list=${encodeURIComponent(movie.Title + " trailer")}`;

    modal.style.display = "flex";
  } catch (e) {
    alert("Не удалось загрузить детали");
  }
}

function closeModal() {
  const modal = document.getElementById("modal");
  const trailer = document.getElementById("trailer");
  modal.style.display = "none";
  trailer.src = ""; // останавливаем видео
}

// Поиск по Enter
document.getElementById("searchInput").addEventListener("keypress", e => {
  if (e.key === "Enter") searchMovies();
});
</script>

</body>
</html>
