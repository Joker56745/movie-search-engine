<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Movie Search</title>

<style>
body {
  font-family: Arial;
  background: #111;
  color: white;
  text-align: center;
  margin: 0;
}

input {
  padding: 10px;
  margin: 20px;
  width: 250px;
}

button {
  padding: 10px;
  cursor: pointer;
}

.movies {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
}

.card {
  background: #222;
  margin: 10px;
  padding: 10px;
  border-radius: 10px;
  width: 160px;
  cursor: pointer;
  transition: 0.3s;
}

.card:hover {
  transform: scale(1.05);
}

img {
  width: 100%;
  border-radius: 5px;
}

.modal {
  display: none;
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: rgba(0,0,0,0.9);
  justify-content: center;
  align-items: center;
}

.modal-content {
  background: #222;
  padding: 20px;
  border-radius: 10px;
  width: 300px;
}
</style>
</head>

<body>

<h2>🎬 Поиск фильмов</h2>

<input id="searchInput" placeholder="Название фильма">
<button onclick="searchMovies()">Поиск</button>

<div id="movies" class="movies"></div>

<div id="modal" class="modal">
  <div class="modal-content">
    <h3 id="title"></h3>
    <p id="info"></p>
    <button onclick="watchTrailer()">▶ Трейлер</button>
    <br><br>
    <button onclick="closeModal()">Закрыть</button>
  </div>
</div>

<script>
const API_KEY = "c48d419a";

async function searchMovies() {
  let query = document.getElementById("searchInput").value;
  if (!query) return;

  let res = await fetch(`https://www.omdbapi.com/?apikey=${API_KEY}&s=${query}`);
  let data = await res.json();

  let container = document.getElementById("movies");
  container.innerHTML = "";

  if (data.Search) {
    data.Search.forEach(movie => {
      let div = document.createElement("div");
      div.className = "card";

      let poster = (movie.Poster && movie.Poster !== "N/A")
        ? movie.Poster
        : "https://via.placeholder.com/150x220?text=No+Image";

      div.innerHTML = `
        <img src="${poster}">
        <p>${movie.Title}</p>
      `;

      div.onclick = () => showMovie(movie.imdbID);

      container.appendChild(div);
    });
  } else {
    container.innerText = "Ничего не найдено";
  }
}

async function showMovie(id) {
  let res = await fetch(`https://www.omdbapi.com/?apikey=${API_KEY}&i=${id}`);
  let data = await res.json();

  document.getElementById("title").innerText = data.Title;
  document.getElementById("info").innerText =
    data.Year + " | ⭐ " + data.imdbRating;

  window.currentMovie = data.Title;

  document.getElementById("modal").style.display = "flex";
}

function watchTrailer() {
  if (window.currentMovie) {
    window.open(
      "https://www.youtube.com/results?search_query=" +
      encodeURIComponent(window.currentMovie + " trailer"),
      "_blank"
    );
  }
}

function closeModal() {
  document.getElementById("modal").style.display = "none";
}

document.getElementById("searchInput")
  .addEventListener("keypress", e => {
    if (e.key === "Enter") searchMovies();
});
</script>

</body>
</html>
