<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Поиск фильмов</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #111;
      color: #fff;
      margin: 0;
      padding: 20px;
      text-align: center;
    }
    h1 { margin: 20px 0; }
    .controls {
      margin: 20px 0;
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
    }
    input { padding: 12px; width: 280px; font-size: 16px; border-radius: 8px; border: none; }
    button { 
      padding: 12px 20px; 
      background: #e50914; 
      color: white; 
      border: none; 
      border-radius: 8px; 
      cursor: pointer; 
    }
    select { padding: 12px; border-radius: 8px; background: #222; color: white; }

    .movies {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
      margin-top: 30px;
    }
    .card {
      background: #222;
      width: 180px;
      border-radius: 12px;
      overflow: hidden;
      cursor: pointer;
      transition: 0.3s;
      position: relative;
    }
    .card:hover { transform: scale(1.08); box-shadow: 0 0 20px rgba(229,9,20,0.6); }
    .card img { width: 100%; height: 260px; object-fit: cover; }
    .info { padding: 12px; }
    .favorite {
      position: absolute;
      top: 10px;
      right: 10px;
      background: rgba(0,0,0,0.6);
      border: none;
      font-size: 20px;
      cursor: pointer;
      padding: 5px;
      border-radius: 50%;
    }

    .modal {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.95);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }
    .modal-content {
      background: #222;
      padding: 25px;
      border-radius: 12px;
      max-width: 700px;
      width: 90%;
    }
    .close { float: right; font-size: 32px; cursor: pointer; }
    .trailer-btn {
      background: #ff0000;
      color: white;
      padding: 12px 20px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      margin: 15px 0;
    }
    .pagination {
      margin: 30px 0;
    }
  </style>
</head>
<body>

  <h1>🎬 Поиск фильмов</h1>
  
  <div class="controls">
    <input id="searchInput" placeholder="Название фильма..." type="text">
    <select id="typeFilter">
      <option value="">Все</option>
      <option value="movie">Фильмы</option>
      <option value="series">Сериалы</option>
    </select>
    <button onclick="searchMovies(1)">Искать</button>
  </div>

  <div class="movies" id="movies"></div>
  <div class="pagination" id="pagination"></div>

  <!-- Модальное окно -->
  <div id="modal" class="modal">
    <div class="modal-content">
      <span class="close" onclick="closeModal()">×</span>
      <h2 id="modalTitle"></h2>
      <div id="modalMeta" style="margin: 10px 0; color: #ccc;"></div>
      <button class="trailer-btn" onclick="watchTrailer()">▶ Смотреть трейлер на YouTube</button>
      <p id="modalPlot" style="text-align: left; line-height: 1.5;"></p>
    </div>
  </div>

<script>
const API_KEY = "be3d5ef4";
let currentPage = 1;
let currentQuery = "";
let currentType = "";

function searchMovies(page = 1) {
  currentQuery = document.getElementById("searchInput").value.trim();
  currentType = document.getElementById("typeFilter").value;
  currentPage = page;

  if (!currentQuery) return;

  const container = document.getElementById("movies");
  container.innerHTML = "<p>Загрузка...</p>";

  let url = `https://www.omdbapi.com/?apikey=${API_KEY}&s=${encodeURIComponent(currentQuery)}&page=${page}`;
  if (currentType) url += `&type=${currentType}`;

  fetch(url)
    .then(res => res.json())
    .then(data => {
      container.innerHTML = "";
      if (data.Response === "True" && data.Search) {
        data.Search.forEach(movie => renderCard(movie));
        renderPagination(data.totalResults);
      } else {
        container.innerHTML = "<p>Ничего не найдено 😔</p>";
      }
    })
    .catch(() => container.innerHTML = "<p>Ошибка загрузки</p>");
}

function renderCard(movie) {
  const container = document.getElementById("movies");
  const div = document.createElement("div");
  div.className = "card";

  const isFavorite = isInFavorites(movie.imdbID);
  const poster = movie.Poster !== "N/A" ? movie.Poster : "https://via.placeholder.com/300x400/222/aaa?text=No+Poster";

  div.innerHTML = `
    <button class="favorite" onclick="toggleFavorite(event, '${movie.imdbID}', '${movie.Title}', '${movie.Year}', '${movie.Poster}')">
      ${isFavorite ? '❤️' : '♡'}
    </button>
    <img src="${poster}" onclick="showMovieDetails('${movie.imdbID}')">
    <div class="info" onclick="showMovieDetails('${movie.imdbID}')">
      <strong>${movie.Title}</strong><br>
      <small>${movie.Year} • ${movie.Type}</small>
    </div>
  `;
  container.appendChild(div);
}

function renderPagination(totalResults) {
  const totalPages = Math.ceil(totalResults / 10);
  const pagination = document.getElementById("pagination");
  pagination.innerHTML = `
    <button ${currentPage === 1 ? 'disabled' : ''} onclick="searchMovies(${currentPage-1})">← Назад</button>
    <span>Страница ${currentPage} из ${totalPages}</span>
    <button ${currentPage >= totalPages ? 'disabled' : ''} onclick="searchMovies(${currentPage+1})">Вперёд →</button>
  `;
}

// Избранное
function toggleFavorite(e, id, title, year, poster) {
  e.stopPropagation();
  let favorites = JSON.parse(localStorage.getItem("favorites") || "[]");
  
  const index = favorites.findIndex(f => f.id === id);
  if (index === -1) {
    favorites.push({id, title, year, poster});
  } else {
    favorites.splice(index, 1);
  }
  
  localStorage.setItem("favorites", JSON.stringify(favorites));
  searchMovies(currentPage); // перерисовываем
}

function isInFavorites(id) {
  const favorites = JSON.parse(localStorage.getItem("favorites") || "[]");
  return favorites.some(f => f.id === id);
}

// Модальное окно и трейлер (оставил как было)
async function showMovieDetails(imdbID) {
  // ... (можно вставить код из предыдущей версии)
  alert("Подробная информация пока в разработке.\n\nТрейлер можно открыть через кнопку в избранном позже 😉");
}

function watchTrailer() {
  alert("Трейлер пока открывается через поиск YouTube");
}

function closeModal() {
  document.getElementById("modal").style.display = "none";
}

// Enter
document.getElementById("searchInput").addEventListener("keypress", e => {
  if (e.key === "Enter") searchMovies(1);
});
</script>

</body>
</html>
