<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Поиск фильмов</title>
  <style>
    body {font-family: Arial, sans-serif; background: #111; color: #fff; margin: 0; padding: 20px; text-align: center;}
    h1 {margin: 20px 0;}
    .controls {margin: 20px 0; display: flex; justify-content: center; gap: 10px; flex-wrap: wrap;}
    input {padding: 12px; width: 280px; font-size: 16px; border-radius: 8px; border: none;}
    button, select {padding: 12px 20px; background: #e50914; color: white; border: none; border-radius: 8px; cursor: pointer;}
    select {background: #222;}

    .movies {display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; margin-top: 30px;}
    .card {
      background: #222;
      width: 180px;
      border-radius: 12px;
      overflow: hidden;
      cursor: pointer;
      transition: 0.3s;
      position: relative;
    }
    .card:hover {transform: scale(1.08); box-shadow: 0 0 20px rgba(229,9,20,0.6);}
    .card img {width: 100%; height: 260px; object-fit: cover;}
    .info {padding: 12px;}
    .favorite {
      position: absolute; top: 10px; right: 10px;
      background: rgba(0,0,0,0.7); border: none; font-size: 22px;
      cursor: pointer; padding: 5px 8px; border-radius: 50%;
    }

    .modal {
      display: none; position: fixed; top: 0; left: 0;
      width: 100%; height: 100%; background: rgba(0,0,0,0.95);
      z-index: 1000; align-items: center; justify-content: center;
    }
    .modal-content {
      background: #1f1f1f; padding: 25px; border-radius: 16px;
      max-width: 720px; width: 90%; text-align: left; position: relative;
    }
    .close {position: absolute; top: 15px; right: 25px; font-size: 36px; cursor: pointer; color: #aaa;}
    .close:hover {color: white;}
    .trailer-btn {
      background: #ff0000; color: white; padding: 14px 24px;
      border: none; border-radius: 8px; font-size: 16px; cursor: pointer; margin: 15px 0;
    }
  </style>
</head>
<body>

  <h1>🎬 Поиск фильмов</h1>
  
  <div class="controls">
    <input id="searchInput" placeholder="Название фильма..." type="text">
    <select id="typeFilter">
      <option value="">Все</option>
      <option value="movie">Фильмы</option>
      <option value="series">Сериалы</option>
    </select>
    <button onclick="searchMovies(1)">Искать</button>
  </div>

  <div class="movies" id="movies"></div>

  <!-- Модальное окно -->
  <div id="modal" class="modal">
    <div class="modal-content">
      <span class="close" onclick="closeModal()">×</span>
      <h2 id="modalTitle"></h2>
      <div id="modalMeta" style="color:#bbb; margin:10px 0;"></div>
      <button class="trailer-btn" onclick="watchTrailer()">▶ Смотреть трейлер на YouTube</button>
      <p id="modalPlot" style="line-height:1.6;"></p>
    </div>
  </div>

<script>
const API_KEY = "be3d5ef4";

async function searchMovies(page = 1) {
  const query = document.getElementById("searchInput").value.trim();
  if (!query) return;

  const container = document.getElementById("movies");
  container.innerHTML = "<p>Загрузка...</p>";

  const type = document.getElementById("typeFilter").value;
  let url = `https://www.omdbapi.com/?apikey=${API_KEY}&s=${encodeURIComponent(query)}&page=${page}`;
  if (type) url += `&type=${type}`;

  try {
    const res = await fetch(url);
    const data = await res.json();

    container.innerHTML = "";
    if (data.Response === "True") {
      data.Search.forEach(movie => {
        const div = document.createElement("div");
        div.className = "card";
        const poster = movie.Poster !== "N/A" ? movie.Poster : "https://via.placeholder.com/300x400/222/aaa?text=No+Poster";

        div.innerHTML = `
          <img src="${poster}" onclick="showMovieDetails('${movie.imdbID}')">
          <div class="info" onclick="showMovieDetails('${movie.imdbID}')">
            <strong>${movie.Title}</strong><br>
            <small>${movie.Year} • ${movie.Type}</small>
          </div>
        `;
        container.appendChild(div);
      });
    } else {
      container.innerHTML = "<p>Ничего не найдено</p>";
    }
  } catch(e) {
    container.innerHTML = "<p>Ошибка загрузки</p>";
  }
}

async function showMovieDetails(imdbID) {
  try {
    const res = await fetch(`https://www.omdbapi.com/?apikey=${API_KEY}&i=${imdbID}&plot=full`);
    const movie = await res.json();

    document.getElementById("modalTitle").textContent = movie.Title;
    document.getElementById("modalMeta").innerHTML = `${movie.Year} • ${movie.Runtime} • ⭐ ${movie.imdbRating}`;
    document.getElementById("modalPlot").textContent = movie.Plot || "Нет описания";

    window.currentTitle = movie.Title + " " + movie.Year;
    document.getElementById("modal").style.display = "flex";
  } catch(e) {
    alert("Ошибка загрузки деталей");
  }
}

function watchTrailer() {
  if (window.currentTitle) {
    window.open(`https://www.youtube.com/results?search_query=${encodeURIComponent(window.currentTitle + " official trailer")}`, '_blank');
  }
}

function closeModal() {
  document.getElementById("modal").style.display = "none";
}

document.getElementById("searchInput").addEventListener("keypress", e => {
  if (e.key === "Enter") searchMovies(1);
});
</script>
</body>
</html>
