<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Movie Search</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #111;
      color: white;
      text-align: center;
      margin: 0;
      padding: 20px;
    }
    input {
      padding: 12px;
      width: 280px;
      font-size: 16px;
      border: none;
      border-radius: 8px;
    }
    button {
      padding: 12px 20px;
      font-size: 16px;
      cursor: pointer;
      background: #e50914;
      color: white;
      border: none;
      border-radius: 8px;
    }
    .movies {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
      margin-top: 30px;
    }
    .card {
      background: #222;
      width: 180px;
      border-radius: 12px;
      overflow: hidden;
      transition: 0.3s;
      cursor: pointer;
    }
    .card:hover {
      transform: scale(1.08);
      box-shadow: 0 0 15px rgba(229, 9, 20, 0.5);
    }
    img {
      width: 100%;
      height: 260px;
      object-fit: cover;
    }
    .info {
      padding: 10px;
    }
    .title {
      margin: 8px 0 4px;
      font-size: 15px;
      font-weight: bold;
    }
    .year {
      color: #aaa;
      font-size: 14px;
    }
  </style>
</head>
<body>

<h2>🎬 Поиск фильмов</h2>

<input id="searchInput" placeholder="Название фильма (на русском или английском)" type="text">
<button onclick="searchMovies()">🔍 Искать</button>

<div class="movies" id="movies"></div>

<script>
async function searchMovies() {
  const query = document.getElementById("searchInput").value.trim();
  if (!query) return;

  const url = `https://www.omdbapi.com/?apikey=be3d5ef4&s=${encodeURIComponent(query)}`;

  try {
    const response = await fetch(url);
    const data = await response.json();
    
    const container = document.getElementById("movies");
    container.innerHTML = "";

    if (data.Search) {
      data.Search.forEach(movie => {
        const div = document.createElement("div");
        div.className = "card";
        
        div.innerHTML = `
          <img src="${movie.Poster !== 'N/A' ? movie.Poster : 'https://via.placeholder.com/300x400?text=No+Poster'}" alt="${movie.Title}">
          <div class="info">
            <div class="title">${movie.Title}</div>
            <div class="year">${movie.Year}</div>
          </div>
        `;
        
        // Клик по карточке — потом сделаем подробности
        div.onclick = () => showDetails(movie.imdbID);
        
        container.appendChild(div);
      });
    } else {
      container.innerHTML = `<p>Ничего не найдено по запросу "${query}"</p>`;
    }
  } catch (e) {
    console.error(e);
    document.getElementById("movies").innerHTML = "<p>Ошибка соединения</p>";
  }
}

// Заглушка для будущих подробностей
function showDetails(imdbID) {
  alert(`Открываем подробности для ID: ${imdbID}\n(следующий шаг — модальное окно)`);
}

// Поиск по Enter
document.getElementById("searchInput").addEventListener("keypress", (e) => {
  if (e.key === "Enter") searchMovies();
});
</script>

</body>
</html>
