<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Поиск фильмов</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #111;
      color: #fff;
      margin: 0;
      padding: 20px;
      text-align: center;
    }
    h1 { margin: 20px 0; }
    .controls {
      margin: 20px 0;
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
    }
    input { padding: 12px; width: 280px; font-size: 16px; border-radius: 8px; border: none; }
    button, select { padding: 12px 20px; background: #e50914; color: white; border: none; border-radius: 8px; cursor: pointer; }
    select { background: #222; }

    .movies {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
      margin-top: 30px;
    }
    .card {
      background: #222;
      width: 180px;
      height: 340px;           /* Фиксированная высота */
      border-radius: 12px;
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.3s ease;
      display: flex;
      flex-direction: column;
    }
    .card:hover {
      transform: scale(1.08);
    }
    .poster-container {
      height: 260px;
      background: #1a1a1a;
      position: relative;
    }
    .card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .no-poster {
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #666;
      font-size: 13px;
      text-align: center;
      padding: 10px;
    }
    .info {
      padding: 12px;
      flex-grow: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
  </style>
</head>
<body>

  <h1>🎬 Поиск фильмов</h1>
  
  <div class="controls">
    <input id="searchInput" placeholder="Название фильма..." type="text">
    <select id="typeFilter">
      <option value="">Все</option>
      <option value="movie">Фильмы</option>
      <option value="series">Сериалы</option>
    </select>
    <button onclick="searchMovies()">Искать</button>
  </div>

  <div class="movies" id="movies"></div>

  <!-- Модальное окно -->
  <div id="modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index:1000; align-items:center; justify-content:center;">
    <div style="background:#1f1f1f; padding:25px; border-radius:16px; max-width:700px; width:90%; text-align:left; position:relative;">
      <span onclick="closeModal()" style="position:absolute; top:15px; right:25px; font-size:36px; cursor:pointer; color:#aaa;">×</span>
      <h2 id="modalTitle"></h2>
      <div id="modalMeta" style="color:#bbb; margin:10px 0;"></div>
      <button onclick="watchTrailer()" style="background:#ff0000; color:white; padding:14px 24px; border:none; border-radius:8px; cursor:pointer; margin:10px 0;">▶ Смотреть трейлер</button>
      <p id="modalPlot" style="line-height:1.6;"></p>
    </div>
  </div>

<script>
const API_KEY = "be3d5ef4";

async function searchMovies() {
  const query = document.getElementById("searchInput").value.trim();
  if (!query) return;

  const container = document.getElementById("movies");
  container.innerHTML = "<p>Загрузка...</p>";

  const type = document.getElementById("typeFilter").value;
  let url = `https://www.omdbapi.com/?apikey=${API_KEY}&s=${encodeURIComponent(query)}`;
  if (type) url += `&type=${type}`;

  try {
    const res = await fetch(url);
    const data = await res.json();

    container.innerHTML = "";
    if (data.Response === "True" && data.Search) {
      data.Search.forEach(movie => renderCard(movie));
    } else {
      container.innerHTML = "<p>Ничего не найдено 😔</p>";
    }
  } catch(e) {
    container.innerHTML = "<p>Ошибка загрузки</p>";
  }
}

function renderCard(movie) {
  const div = document.createElement("div");
  div.className = "card";

  const hasPoster = movie.Poster && movie.Poster !== "N/A";

  div.innerHTML = `
    <div class="poster-container">
      ${hasPoster 
        ? `<img src="${movie.Poster}" alt="${movie.Title}" onerror="this.style.display='none'; this.parentElement.innerHTML += '<div class=no-poster>Нет обложки</div>'">`
        : `<div class="no-poster">Нет обложки</div>`}
    </div>
    <div class="info" onclick="showMovieDetails('${movie.imdbID}')">
      <strong>${movie.Title}</strong><br>
      <small>${movie.Year} • ${movie.Type}</small>
    </div>
  `;
  document.getElementById("movies").appendChild(div);
}

async function showMovieDetails(id) {
  const res = await fetch(`https://www.omdbapi.com/?apikey=${API_KEY}&i=${id}&plot=full`);
  const m = await res.json();
  
  document.getElementById("modalTitle").textContent = m.Title;
  document.getElementById("modalMeta").innerHTML = `${m.Year} • ${m.Runtime || '—'} • ⭐ ${m.imdbRating || '—'}`;
  document.getElementById("modalPlot").textContent = m.Plot || "Нет описания";
  window.currentTitle = m.Title + " " + m.Year;
  document.getElementById("modal").style.display = "flex";
}

function watchTrailer() {
  if (window.currentTitle) {
    window.open(`https://www.youtube.com/results?search_query=${encodeURIComponent(window.currentTitle + " official trailer")}`, '_blank');
  }
}

function closeModal() {
  document.getElementById("modal").style.display = "none";
}

document.getElementById("searchInput").addEventListener("keypress", e => {
  if (e.key === "Enter") searchMovies();
});
</script>
</body>
</html>
